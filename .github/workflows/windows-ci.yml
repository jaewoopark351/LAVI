#20260715_kpopmodder: Added the dependency-light Windows quality gate.
name: Windows CI
on: [push, pull_request]
jobs:
  core:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Run canonical Core CPU installer
        shell: pwsh
        run: .\scripts\install_windows.ps1 -Profile Core -Accelerator CPU -Dev
      - name: Re-run canonical Core CPU installer
        shell: pwsh
        run: .\scripts\install_windows.ps1 -Profile Core -Accelerator CPU -Dev
      - name: Compile tracked source files
        shell: pwsh
        run: |
          #20260716_kpopmodder: Avoid compiling repo-local venv and locked temp folders.
          $paths = @(
            "app_core",
            "audio_core",
            "core",
            "llm_core",
            "memory_core",
            "plugin_system",
            "plugins",
            "scripts"
          )
          $paths += (Get-ChildItem -LiteralPath . -Filter *.py -File).FullName
          $paths += (Get-ChildItem -LiteralPath .\tests -Filter *.py -File).FullName
          .\venv\Scripts\python.exe -m compileall -q @paths
      - name: Check dependency consistency
        run: .\venv\Scripts\python.exe -m pip check
      - name: Lint P0 Core files
        run: >
          .\venv\Scripts\python.exe -m ruff check
          app_core\app_composer.py
          core\config_manager.py
          core\profile_resolver.py
          core\paths.py
          plugin_system\loader.py
          plugin_system\selection.py
          scripts\preflight.py
          scripts\smoke_startup.py
          tests\test_app_composer.py
          tests\test_repository_contract.py
          tests\test_smoke_startup.py
          tests\test_plugin_system_imports.py
      - name: Run Core test collection
        run: >
          .\venv\Scripts\python.exe -m pytest
          tests\test_app_composer.py
          tests\test_repository_contract.py
          tests\test_smoke_startup.py
          tests\test_plugin_system_imports.py
      - name: Run Core offline smoke
        run: >
          .\venv\Scripts\python.exe scripts\smoke_startup.py
          --profile Core
          --accelerator CPU
          --offline
          --modules-config config\modules.core.json
          --timeout-sec 30
      - name: Run production configuration smoke
        run: >
          .\venv\Scripts\python.exe scripts\smoke_startup.py
          --production-config-smoke
          --timeout-sec 30
